<!DOCTYPE html>
<html>
<title>HTML Tutorial</title>

<head>
  <style>
    #leagueHeader {
      text-align: center;
      font: 2em sans-serif;
    }

    .bingoBoy {
      width: 100%;
      height: 100%;
      display: flex;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
      margin: auto;
    }

    #league {
      width: 50px;
      height: 50px;
    }

    #saltShaker {
      width: 50px;
      height: 50px;
    }

    #parentBox {
      align-items: center;
      display: flex;
      justify-content: center;
    }

    #childBox {
      display: flex;
      align-items: center;
    }

    #grid-container {
      margin: auto;
      display: grid;
      grid-template-columns: 200px 200px 200px 200px;
      grid-template-rows: 200px 200px 200px 200px;
      border: 1px solid black;
      width: 800px;
      height: 800px;
    }

    #grid-container>div {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0px 0px;
      text-align: center;
      font-size: x-large;
      cursor: pointer;
      user-select: none;
      border: 1px solid black;
    }

    .grid-text {
      padding: 0 10px;
    }
  </style>
  <script>
    const listOfValues = [
      "Someone complains about lane match-up",
      "Someone complains about random",
      "Patrick apologize to Brian",
      "Someone mentions lane or jungle diff",
      "Guys my game froze",
      "4-0 Dragon",
      "We need more wards",
      "Brian forgets to change his summoners / runes",
      "Someone forgets to ban / lock in",
      "Greg says he's muting someone",
      "We lose",
      "Keith shouts really loud",
      "Someone forgot to buy",
      "Enemy team aces us",
      "We lose baron with no vision",
      "Random team member is toxic"
    ]

    const shuffle = (array) => {
      var currentIndex = array.length, temporaryValue, randomIndex;
      while (0 !== currentIndex) {
        randomIndex = Math.floor(Math.random() * currentIndex);
        currentIndex -= 1;
        temporaryValue = array[currentIndex];
        array[currentIndex] = array[randomIndex];
        array[randomIndex] = temporaryValue;
      }
      return array;
    }

    function sound(src) {
      this.sound = document.createElement("audio");
      this.sound.src = src;
      this.sound.setAttribute("preload", "auto");
      this.sound.setAttribute("controls", "none");

      this.sound.style.display = "none";
      this.sound.volume = 1;
      document.body.appendChild(this.sound);
      this.play = function () {
        this.sound.play();
      }
      this.stop = function () {
        this.sound.pause();
      }
    }

    let bingoSound;

    let gameBoard = [
      [false, false, false, false],
      [false, false, false, false],
      [false, false, false, false],
      [false, false, false, false]
    ]

    let winningElements = [];

    const randomizeList = shuffle(listOfValues).slice(0, 16);

    const checkDiagonalVictory = () => {
      if (gameBoard[0][0] && gameBoard[1][1] && gameBoard[2][2] && gameBoard[3][3]) {
        winningElements = [1, 6, 11, 16]
        return true;
      }

      if (gameBoard[0][3] && gameBoard[1][2] && gameBoard[2][1] && gameBoard[3][0]) {
        winningElements = [4, 7, 10, 13]
        return true;
      }
      return false;
    }

    const checkHorizontalVictory = () => {
      let hasVictory = false;
      gameBoard.forEach((row, idx) => {
        if (!row.includes(false)) {
          winningElements = row.map((b, i) => (idx * 4) + i + 1);
          hasVictory = true;
        }
      })
      return hasVictory;
    }

    const checkVerticalVictory = () => {
      let hasVictory = false;
      gameBoard.forEach((x, idx) => {
        if (!gameBoard.map(x => x[idx]).includes(false)) {
          winningElements = gameBoard.map((y, z) => z * 4 + 1 + idx)
          hasVictory = true;
        }
      })
      return hasVictory;
    }

    const getPosition = (elementId) => {
      let y = (id - 1) % 4;
      let x = Math.floor((id - 1) / 4);
      return { x, y }
    }

    const clickHandler = (id) => {
      let victory = false;
      let ele = document.getElementById(id);
      ele.style.backgroundColor = ele.style.backgroundColor == "powderblue" ? "pink" : "powderblue";
      ele.style.textDecoration = ele.style.textDecoration == "line-through" ? "none" : "line-through";

      let y = (id - 1) % 4;
      let x = Math.floor((id - 1) / 4);

      gameBoard[x][y] = !gameBoard[x][y];

      checkDiagonalVictory();

      if (checkHorizontalVictory() || checkVerticalVictory() || checkDiagonalVictory()) {
        raiseVictory();
      }
    }

    const raiseVictory = () => {
      bingoSound.play();
      winningElements.forEach((ele) => {
        let td = document.getElementById(ele)
        td.innerHTML = "<img class= 'bingoBoy' src='bingoBoy.gif' />";
      })

      setTimeout(() => {
        window.alert("BINGO BITCH!!!!")
        location.reload();
      }, 100);
    }

    const initializeElements = () => {
      bingoSound = new sound("that_s_a_bingo.mp3");
      randomizeList.forEach((item, currentIndex) => {
        let div = document.getElementById(currentIndex + 1)
        div.innerHTML = "<div class='grid-text'>" + item + "</div>";
        div.style.backgroundColor = "powderblue";
      })
    }
  </script>
</head>

<body onload="initializeElements()">
  <div id="parentBox">
    <div id="childBox">
      <img id="league" src="LeagueIcon.png" />
      <h1 id="leagueHeader">LEAGUE OF SALT</h1>
      <img id="saltShaker" src="SaltShaker.png" />
    </div>
  </div>
  <div id="grid-container">
    <div id=1 onclick="clickHandler(1)"></div>
    <div id=2 onclick="clickHandler(2)"></div>
    <div id=3 onclick="clickHandler(3)"></div>
    <div id=4 onclick="clickHandler(4)"></div>
    <div id=5 onclick="clickHandler(5)"></div>
    <div id=6 onclick="clickHandler(6)"></div>
    <div id=7 onclick="clickHandler(7)"></div>
    <div id=8 onclick="clickHandler(8)"></div>
    <div id=9 onclick="clickHandler(9)"></div>
    <div id=10 onclick="clickHandler(10)"></div>
    <div id=11 onclick="clickHandler(11)"></div>
    <div id=12 onclick="clickHandler(12)"></div>
    <div id=13 onclick="clickHandler(13)"></div>
    <div id=14 onclick="clickHandler(14)"></div>
    <div id=15 onclick="clickHandler(15)"></div>
    <div id=16 onclick="clickHandler(16)"></div>
  </div>
</body>

</html>
